name: Deploy Supabase Edge Function (groq-ai)

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/groq-ai/**"
      - ".github/workflows/deploy-groq-ai.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy function + set secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          npx supabase@latest secrets set GROQ_API_KEY="$GROQ_API_KEY" --project-ref "$PROJECT_REF"
          npx supabase@latest functions deploy groq-ai --project-ref "$PROJECT_REF"
